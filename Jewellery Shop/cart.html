<!DOCTYPE html>
<html>
<head>
<title>Shopping Cart</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
}

.container{
width:80%;
margin:auto;
margin-top:40px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#333;
color:white;
}

.total{
text-align:right;
font-size:20px;
margin-top:20px;
}

button{
padding:8px 15px;
background:red;
color:white;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2 align="center">Your Shopping Cart</h2>

<table>
<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Remove</th>
</tr>
</thead>

<tbody id="cartItems"></tbody>

</table>
<div style="text-align:right; margin-top:20px;">
<a href="checkout.html">Proceed to Checkout</button></a>
</div>

<div class="total">
Total: ₹<span id="totalPrice">0</span>
</div>

</div>


<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let cartItems = document.getElementById("cartItems");
let total = 0;

function displayCart(){

cartItems.innerHTML = "";

cart.forEach((item,index)=>{

total += item.productPrice;

cartItems.innerHTML += `
<tr>
<td>${item.productName}</td>
<td>₹${item.productPrice}</td>
<td><button onclick="removeItem(${index})">Delete</button></td>
</tr>
`;

});

document.getElementById("totalPrice").innerText = total;

}

function removeItem(index){

cart.splice(index,1);

localStorage.setItem("cart", JSON.stringify(cart));

location.reload();

}

displayCart();

</script>
<script src="script.js"></script>
</body>

</html>
