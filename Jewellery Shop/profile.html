<!DOCTYPE html>
<html>
<head>
  <title>Profile - Royal Jewellery</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .profile-container {
      max-width: 400px;
      margin: 50px auto;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }
    button {
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>
<body onload="loadProfile()">

<header>
  <h1>Royal Jewellery</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="cart.html">Cart 🛒</a>
    <a href="wishlist.html">Wishlist 💖</a>
    <a href="contact.html">Contact</a>
    <a href="login.html">Login</a>
    <a href="register.html">Register</a>
  </nav>
</header>

<div class="profile-container">
  <h2>My Profile</h2>
  <input type="text" id="profileName" placeholder="Name"><br>
  <input type="email" id="profileEmail" placeholder="Email" disabled><br>
  <input type="password" id="profilePassword" placeholder="Password"><br>
  <button onclick="updateProfile()">Update Profile</button>
  <button onclick="logout()">Logout</button>
</div>

<footer>
  <p>© 2026 Royal Jewellery</p>
</footer>

<script>
  // Load current user
  const currentUser = JSON.parse(localStorage.getItem('currentUser'));

  if (!currentUser) {
    alert('Please login first!');
    window.location.href = 'login.html';
  } else {
    document.getElementById('profileName').value = currentUser.name;
    document.getElementById('profileEmail').value = currentUser.email;
    document.getElementById('profilePassword').value = currentUser.password;
  }

  // Update profile
  function updateProfile() {
    let users = JSON.parse(localStorage.getItem('users')) || [];
    const name = document.getElementById('profileName').value;
    const password = document.getElementById('profilePassword').value;

    // Update user in localStorage users array
    users = users.map(user => {
      if (user.email === currentUser.email) {
        return { ...user, name, password };
      }
      return user;
    });

    localStorage.setItem('users', JSON.stringify(users));
    localStorage.setItem('currentUser', JSON.stringify({ ...currentUser, name, password }));
    alert('Profile updated successfully!');
  }

  // Logout
  function logout() {
    localStorage.removeItem('currentUser');
    alert('Logged out successfully!');
    window.location.href = 'login.html';
  }
</script>

</body>
</html>
